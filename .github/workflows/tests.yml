name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Syntax check
        run: python -m py_compile network_usage_dashboard.py tests/test_network_usage_dashboard.py
      - name: Unit tests
        run: python -m pytest -q
